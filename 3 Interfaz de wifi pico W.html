<!DOCTYPE html>

<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SteadyHand</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#07080b;font-family:system-ui,sans-serif;color:#e2e8f0}
.card{background:#111318;border:1px solid #1c2130;border-radius:16px;padding:28px 24px;width:100%;max-width:340px;box-sizing:border-box}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.icon{width:32px;height:32px;background:#00ffe0;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.title{font-size:17px;font-weight:700;font-family:monospace;color:#e2e8f0}
.title em{color:#00ffe0;font-style:normal}
label{display:block;font-size:12px;color:#94a3b8;margin:14px 0 5px}
input{width:100%;padding:10px 12px;background:#0d0f14;border:1px solid #1c2130;border-radius:8px;color:#e2e8f0;font-size:15px;outline:none;box-sizing:border-box;-webkit-appearance:none}
input:focus{border-color:#00ffe0}
button{width:100%;margin-top:20px;padding:13px;background:#00ffe0;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.note{margin-top:18px;background:#0d0f14;border:1px solid #1c2130;border-radius:8px;padding:11px;font-size:11px;color:#64748b;line-height:1.7}
.note b{color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">✋</div>
    <div class="title">Steady<em>Hand</em></div>
  </div>
  <form method="POST" action="file:///D:/setup">
    <label for="s">Nombre de la red (SSID)</label>
    <input id="s" type="text" name="ssid" placeholder="Mi red WiFi" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required="">
    <label for="p">Contrasena</label>
    <input id="p" type="password" name="password" placeholder="Contrasena de 8+ caracteres" required="">
    <button type="submit">Guardar y conectar</button>
  </form>
  <div class="note">
    <b>Siempre disponible:</b><br>
    Conectate a la red <b>SteadyHand</b><br>
    y abri <b>http://192.168.4.1/setup</b><br>
    para cambiar la red en cualquier momento.
  </div>
</div>


</body></html>
